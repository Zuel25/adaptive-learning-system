<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App - Task Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --success-color: #4caf50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --info-color: #2196f3;
            --light-bg: #f8f9fa;
            --dark-bg: #1a1a1a;
            --text-light: #666;
            --text-dark: #333;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #e0e0e0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ========================================
           HEADER
           ======================================== */
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            animation: slideDown 0.5s ease-out;
        }

        body.dark-mode .header {
            background: #2d2d2d;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 32px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        /* ========================================
           INPUT FORM
           ======================================== */
        .input-section {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 10px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        body.dark-mode .form-group label {
            color: #999;
        }

        .form-group input,
        .form-group select {
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
            color: var(--text-dark);
        }

        body.dark-mode .form-group input,
        body.dark-mode .form-group select {
            background: #1a1a1a;
            color: #e0e0e0;
            border-color: #444;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* ========================================
           BUTTONS
           ======================================== */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: var(--text-dark);
            border: 2px solid var(--border-color);
        }

        body.dark-mode .btn-secondary {
            background: #1a1a1a;
            color: #e0e0e0;
            border-color: #444;
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
        }

        .btn-icon {
            padding: 10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========================================
           STATS
           ======================================== */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: 700;
        }

        /* ========================================
           FILTERS
           ======================================== */
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 10px 15px;
            border: 2px solid var(--border-color);
            background: white;
            color: var(--text-dark);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        body.dark-mode .filter-btn {
            background: #1a1a1a;
            color: #e0e0e0;
            border-color: #444;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: var(--primary-color);
        }

        /* ========================================
           TASKS LIST
           ======================================== */
        .tasks-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        body.dark-mode .tasks-container {
            background: #2d2d2d;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .tasks-header {
            background: var(--light-bg);
            padding: 20px;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.dark-mode .tasks-header {
            background: #1a1a1a;
            border-bottom-color: #444;
        }

        .tasks-header h2 {
            color: var(--primary-color);
            font-size: 18px;
        }

        .task-count {
            background: var(--primary-color);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
        }

        .tasks-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .task-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
        }

        body.dark-mode .task-item {
            border-bottom-color: #444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .task-item:hover {
            background: var(--light-bg);
        }

        body.dark-mode .task-item:hover {
            background: #1a1a1a;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-light);
        }

        .checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .task-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .task-text {
            font-weight: 500;
            color: var(--text-dark);
            word-break: break-word;
        }

        body.dark-mode .task-text {
            color: #e0e0e0;
        }

        .task-meta {
            display: flex;
            gap: 10px;
            font-size: 12px;
        }

        .task-priority {
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
            color: white;
        }

        .priority-high {
            background: var(--danger-color);
        }

        .priority-medium {
            background: var(--warning-color);
        }

        .priority-low {
            background: var(--success-color);
        }

        .task-category {
            background: var(--light-bg);
            color: var(--text-dark);
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        body.dark-mode .task-category {
            background: #1a1a1a;
            color: #999;
        }

        .task-date {
            color: var(--text-light);
        }

        .task-actions {
            display: flex;
            gap: 5px;
        }

        .task-actions .btn {
            padding: 8px 10px;
        }

        /* ========================================
           EMPTY STATE
           ======================================== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            color: var(--text-dark);
            margin-bottom: 10px;
            font-size: 18px;
        }

        /* ========================================
           MODAL
           ======================================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out;
        }

        body.dark-mode .modal-content {
            background: #2d2d2d;
        }

        .modal-content h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 20px;
        }

        .modal-content .form-group {
            margin-bottom: 15px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* ========================================
           NOTIFICATIONS
           ======================================== */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 2000;
            animation: slideInRight 0.3s ease-out;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            background: var(--success-color);
        }

        .notification.danger {
            background: var(--danger-color);
        }

        .notification.info {
            background: var(--info-color);
        }

        /* ========================================
           SEARCH
           ======================================== */
        .search-box {
            position: relative;
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
            color: var(--text-dark);
        }

        body.dark-mode .search-box input {
            background: #1a1a1a;
            color: #e0e0e0;
            border-color: #444;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 18px;
            pointer-events: none;
        }

        /* ========================================
           DARK MODE TOGGLE
           ======================================== */
        .theme-toggle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.dark-mode .theme-toggle {
            background: #1a1a1a;
            color: #ffd700;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* ========================================
           RESPONSIVE
           ======================================== */
        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .input-section {
                grid-template-columns: 1fr;
            }

            .header-controls {
                flex-direction: column;
                width: 100%;
            }

            .search-box {
                min-width: auto;
                width: 100%;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .modal-content {
                width: 95%;
                padding: 20px;
            }

            .notification {
                right: 10px;
                left: 10px;
                width: auto;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0;
            }

            .header {
                border-radius: 0;
                padding: 15px;
            }

            .tasks-container {
                border-radius: 0;
            }

            .task-meta {
                flex-wrap: wrap;
            }

            .task-actions {
                flex-direction: column;
            }
        }

        /* ========================================
           SCROLLBAR
           ======================================== */
        .tasks-list::-webkit-scrollbar {
            width: 8px;
        }

        .tasks-list::-webkit-scrollbar-track {
            background: var(--light-bg);
        }

        body.dark-mode .tasks-list::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .tasks-list::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }

        .tasks-list::-webkit-scrollbar-thumb:hover {
            background: var(--secondary-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>✅ To-Do List App</h1>
            
            <div class="header-controls">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Cari task...">
                </div>
                <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
            </div>

            <!-- STATS -->
            <div class="stats">
                <div class="stat-card">
                    <h3>Total Tasks</h3>
                    <div class="number" id="totalTasks">0</div>
                </div>
                <div class="stat-card">
                    <h3>Completed</h3>
                    <div class="number" id="completedTasks">0</div>
                </div>
                <div class="stat-card">
                    <h3>In Progress</h3>
                    <div class="number" id="inProgressTasks">0</div>
                </div>
                <div class="stat-card">
                    <h3>Completion Rate</h3>
                    <div class="number" id="completionRate">0%</div>
                </div>
            </div>

            <!-- INPUT FORM -->
            <div class="input-section">
                <div class="form-group">
                    <label for="taskInput">Task Description</label>
                    <input type="text" id="taskInput" placeholder="Add a new task...">
                </div>
                <div class="form-group">
                    <label for="prioritySelect">Priority</label>
                    <select id="prioritySelect">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="categorySelect">Category</label>
                    <select id="categorySelect">
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="shopping">Shopping</option>
                        <option value="health">Health</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <button class="btn btn-primary" id="addBtn">➕ Add Task</button>
            </div>

            <!-- FILTERS -->
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All Tasks</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="filter-btn" data-filter="high">High Priority</button>
            </div>
        </div>

        <!-- TASKS CONTAINER -->
        <div class="tasks-container">
            <div class="tasks-header">
                <h2>📝 My Tasks</h2>
                <span class="task-count" id="taskCount">0</span>
            </div>
            <div class="tasks-list" id="tasksList">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <h3>No tasks yet</h3>
                    <p>Add a new task to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2>Edit Task</h2>
            <div class="form-group">
                <label for="editTaskInput">Task Description</label>
                <input type="text" id="editTaskInput">
            </div>
            <div class="form-group">
                <label for="editPrioritySelect">Priority</label>
                <select id="editPrioritySelect">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="form-group">
                <label for="editCategorySelect">Category</label>
                <select id="editCategorySelect">
                    <option value="work">Work</option>
                    <option value="personal">Personal</option>
                    <option value="shopping">Shopping</option>
                    <option value="health">Health</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEditTask()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // ========================================
        // STATE & CONFIG
        // ========================================
        let tasks = [];
        let currentFilter = 'all';
        let editingTaskId = null;
        const STORAGE_KEY = 'todolist_tasks';
        const THEME_KEY = 'todolist_theme';

        // ========================================
        // INITIALIZATION
        // ========================================
        document.addEventListener('DOMContentLoaded', () => {
            loadTasks();
            loadTheme();
            setupEventListeners();
            updateStats();
            renderTasks();
        });

        function setupEventListeners() {
            // Add task button
            document.getElementById('addBtn').addEventListener('click', addTask);
            document.getElementById('taskInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });

            // Search
            document.getElementById('searchInput').addEventListener('input', renderTasks);

            // Filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.filter;
                    renderTasks();
                });
            });

            // Theme toggle
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        }

        // ========================================
        // TASK FUNCTIONS
        // ========================================
        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const text = taskInput.value.trim();

            if (!text) {
                showNotification('Please enter a task!', 'danger');
                return;
            }

            const task = {
                id: Date.now(),
                text: text,
                priority: document.getElementById('prioritySelect').value,
                category: document.getElementById('categorySelect').value,
                completed: false,
                createdAt: new Date().toLocaleString()
            };

            tasks.unshift(task);
            saveTasks();
            taskInput.value = '';
            updateStats();
            renderTasks();
            showNotification('Task added successfully! ✅', 'success');
        }

        function deleteTask(id) {
            if (!confirm('Are you sure you want to delete this task?')) return;

            tasks = tasks.filter(task => task.id !== id);
            saveTasks();
            updateStats();
            renderTasks();
            showNotification('Task deleted! 🗑️', 'success');
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                updateStats();
                renderTasks();
                showNotification(
                    task.completed ? 'Task completed! 🎉' : 'Task marked as incomplete.',
                    'success'
                );
            }
        }

        function openEditModal(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            editingTaskId = id;
            document.getElementById('editTaskInput').value = task.text;
            document.getElementById('editPrioritySelect').value = task.priority;
            document.getElementById('editCategorySelect').value = task.category;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingTaskId = null;
        }

        function saveEditTask() {
            if (editingTaskId === null) return;

            const task = tasks.find(t => t.id === editingTaskId);
            if (!task) return;

            const newText = document.getElementById('editTaskInput').value.trim();
            if (!newText) {
                showNotification('Task cannot be empty!', 'danger');
                return;
            }

            task.text = newText;
            task.priority = document.getElementById('editPrioritySelect').value;
            task.category = document.getElementById('editCategorySelect').value;

            saveTasks();
            updateStats();
            renderTasks();
            closeEditModal();
            showNotification('Task updated! ✏️', 'success');
        }

        // ========================================
        // RENDERING
        // ========================================
        function renderTasks() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filteredTasks = tasks.filter(task => {
                // Apply search filter
                if (searchTerm && !task.text.toLowerCase().includes(searchTerm)) {
                    return false;
                }

                // Apply status filter
                switch(currentFilter) {
                    case 'active':
                        return !task.completed;
                    case 'completed':
                        return task.completed;
                    case 'high':
                        return task.priority === 'high';
                    default:
                        return true;
                }
            });

            const tasksList = document.getElementById('tasksList');
            document.getElementById('taskCount').textContent = filteredTasks.length;

            if (filteredTasks.length === 0) {
                tasksList.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <h3>No tasks found</h3>
                        <p>${searchTerm ? 'Try a different search term' : 'Add a new task to get started!'}</p>
                    </div>
                `;
                return;
            }

            tasksList.innerHTML = filteredTasks.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <input type="checkbox" class="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
                    <div class="task-content">
                        <div class="task-text">${escapeHtml(task.text)}</div>
                        <div class="task-meta">
                            <span class="task-priority priority-${task.priority}">${capitalizeFirst(task.priority)}</span>
                            <span class="task-category">${capitalizeFirst(task.category)}</span>
                            <span class="task-date">📅 ${task.createdAt}</span>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="btn btn-secondary btn-small" onclick="openEditModal(${task.id})">✏️</button>
                        <button class="btn btn-danger btn-small" onclick="deleteTask(${task.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // ========================================
        // STATS
        // ========================================
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const inProgress = total - completed;
            const rate = total === 0 ? 0 : Math.round((completed / total) * 100);

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('inProgressTasks').textContent = inProgress;
            document.getElementById('completionRate').textContent = rate + '%';
        }

        // ========================================
        // STORAGE
        // ========================================
        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        function loadTasks() {
            const stored = localStorage.getItem(STORAGE_KEY);
            tasks = stored ? JSON.parse(stored) : [];
        }

        // ========================================
        // THEME
        // ========================================
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            localStorage.setItem(THEME_KEY, isDarkMode ? 'dark' : 'light');
        }

        function loadTheme() {
            const theme = localStorage.getItem(THEME_KEY);
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
            }
        }

        // ========================================
        // NOTIFICATIONS
        // ========================================
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // ========================================
        // UTILITY FUNCTIONS
        // ========================================
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function capitalizeFirst(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }
    </script>
</body>
</html>
