<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pembelajaran Adaptif - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🎓 Sistem Pembelajaran Adaptif</h1>
            <p class="subtitle">Pembelajaran Numerasi Pintar dengan AI</p>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Masukkan email Anda" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>

                <div class="form-group">
                    <label for="role">Login Sebagai</label>
                    <select id="role" required>
                        <option value="">-- Pilih Tipe Login --</option>
                        <option value="student">Siswa</option>
                        <option value="teacher">Guru</option>
                    </select>
                </div>

                <button type="submit" class="btn-login">Login</button>
            </form>

            <div class="demo-login">
                <p>📌 Demo Login:</p>
                <button type="button" class="btn-demo" onclick="demoLogin('student')">Login Siswa Demo</button>
                <button type="button" class="btn-demo" onclick="demoLogin('teacher')">Login Guru Demo</button>
            </div>

            <div class="info-box">
                <p><strong>Akun Demo:</strong></p>
                <p>Siswa: student@example.com / student123</p>
                <p>Guru: teacher@example.com / teacher123</p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
