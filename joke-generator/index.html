<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator 😂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #667eea;
            font-size: 36px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .joke-container {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-left: 4px solid #667eea;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .joke-setup {
            color: #333;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .joke-punchline {
            color: #667eea;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.6;
            padding-top: 15px;
            border-top: 2px dashed #667eea;
            margin-top: 15px;
        }

        .single-joke {
            color: #333;
            font-size: 18px;
            font-weight: 500;
            line-height: 1.8;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 16px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .btn-copy {
            background: #4caf50;
            color: white;
        }

        .btn-copy:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-copy.copied {
            background: #2196f3;
        }

        .joke-type {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }

        .category-filter {
            margin-bottom: 25px;
            text-align: center;
        }

        .category-filter label {
            color: #333;
            font-weight: 600;
            margin-right: 10px;
            font-size: 14px;
        }

        .category-filter select {
            padding: 10px 15px;
            border: 2px solid #667eea;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            background: white;
            color: #333;
            transition: all 0.3s ease;
        }

        .category-filter select:hover {
            border-color: #764ba2;
        }

        .category-filter select:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .stats {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .stats p {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }

        .stats strong {
            color: #667eea;
            font-size: 18px;
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .error.active {
            display: block;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-10px);
            }
            75% {
                transform: translateX(10px);
            }
        }

        .success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .success.active {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
                border-radius: 15px;
            }

            .header h1 {
                font-size: 28px;
            }

            .joke-container {
                padding: 20px;
                min-height: 80px;
            }

            .joke-setup,
            .joke-punchline,
            .single-joke {
                font-size: 16px;
            }

            .button-group {
                flex-direction: column;
                gap: 10px;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .category-filter {
                flex-direction: column;
            }

            .category-filter label {
                display: block;
                margin-bottom: 10px;
                margin-right: 0;
            }

            .category-filter select {
                width: 100%;
            }
        }

        .placeholder {
            color: #999;
            text-align: center;
            padding: 40px 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>😂 Joke Generator 😂</h1>
            <p>Dapatkan lelucon acak yang akan membuat Anda tertawa!</p>
        </div>

        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>

        <div class="stats">
            <p>Jokes Loaded: <strong id="jokesLoaded">0</strong></p>
        </div>

        <div class="category-filter">
            <label for="categorySelect">Pilih Kategori:</label>
            <select id="categorySelect">
                <option value="any">Semua Kategori</option>
                <option value="general">Umum</option>
                <option value="programming">Programming</option>
                <option value="knock-knock">Knock-Knock</option>
            </select>
        </div>

        <div class="joke-container" id="jokeContainer">
            <p class="placeholder">👇 Klik tombol di bawah untuk menampilkan lelucon pertama Anda!</p>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" id="getJokeBtn">
                <span>🎲</span> Lelucon Baru
            </button>
            <button class="btn btn-secondary" id="copyBtn" style="display: none;">
                <span>📋</span> Salin
            </button>
            <button class="btn btn-secondary" id="shareBtn" style="display: none;">
                <span>📤</span> Bagikan
            </button>
        </div>
    </div>

    <script>
        // API Configuration
        const API_URL = 'https://api.api-ninjas.com/v1/jokes';
        const API_KEY = 'YOUR_API_KEY'; // Bisa juga pakai API gratis lainnya

        // State
        let currentJoke = null;
        let jokesLoaded = 0;

        // DOM Elements
        const jokeContainer = document.getElementById('jokeContainer');
        const getJokeBtn = document.getElementById('getJokeBtn');
        const copyBtn = document.getElementById('copyBtn');
        const shareBtn = document.getElementById('shareBtn');
        const categorySelect = document.getElementById('categorySelect');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const jokesLoadedDisplay = document.getElementById('jokesLoaded');

        // Get Joke from API
        async function getJoke() {
            const category = categorySelect.value;
            const url = category === 'any' ? API_URL : `${API_URL}?category=${category}`;

            try {
                showLoading(true);
                hideError();

                // Menggunakan API gratis tanpa perlu API key
                const response = await fetch('https://api.api-ninjas.com/v1/jokes?limit=1', {
                    headers: {
                        'X-Api-Key': 'bEJ5RWZ6Uk5tZUhSMXlZRStHQjh6UT09'
                    }
                });

                if (!response.ok) {
                    throw new Error('Gagal mengambil lelucon');
                }

                const data = await response.json();

                if (data && data.length > 0) {
                    currentJoke = data[0];
                    displayJoke(currentJoke);
                    jokesLoaded++;
                    jokesLoadedDisplay.textContent = jokesLoaded;
                } else {
                    showError('Tidak ada lelucon yang ditemukan. Coba kategori lain!');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Terjadi kesalahan saat mengambil lelucon. Pastikan Anda terhubung ke internet!');
            } finally {
                showLoading(false);
            }
        }

        // Display Joke
        function displayJoke(joke) {
            let jokeHTML = '';

            if (joke.setup && joke.punchline) {
                // Two-part joke
                jokeHTML = `
                    <div class="joke-setup">${escapeHtml(joke.setup)}</div>
                    <div class="joke-punchline">${escapeHtml(joke.punchline)}</div>
                    <div class="joke-type">Tipe: Setup & Punchline</div>
                `;
            } else {
                // Single joke
                jokeHTML = `
                    <div class="single-joke">${escapeHtml(joke.joke || 'Lelucon tidak tersedia')}</div>
                    <div class="joke-type">Tipe: Single Joke</div>
                `;
            }

            jokeContainer.innerHTML = jokeHTML;
            copyBtn.style.display = 'inline-flex';
            shareBtn.style.display = 'inline-flex';
        }

        // Show Loading State
        function showLoading(show) {
            if (show) {
                jokeContainer.innerHTML = `
                    <div class="loading active">
                        <div class="spinner"></div>
                        <p>Sedang mencari lelucon yang lucu...</p>
                    </div>
                `;
                getJokeBtn.disabled = true;
                getJokeBtn.style.opacity = '0.6';
            } else {
                getJokeBtn.disabled = false;
                getJokeBtn.style.opacity = '1';
            }
        }

        // Copy to Clipboard
        function copyToClipboard() {
            if (!currentJoke) return;

            let jokeText = '';
            if (currentJoke.setup && currentJoke.punchline) {
                jokeText = `${currentJoke.setup}\n${currentJoke.punchline}`;
            } else {
                jokeText = currentJoke.joke || '';
            }

            navigator.clipboard.writeText(jokeText)
                .then(() => {
                    showSuccess('Lelucon berhasil disalin ke clipboard!');
                    copyBtn.textContent = '✓ Tersalin';
                    setTimeout(() => {
                        copyBtn.innerHTML = '<span>📋</span> Salin';
                    }, 2000);
                })
                .catch(err => {
                    showError('Gagal menyalin ke clipboard');
                });
        }

        // Share Joke
        function shareJoke() {
            if (!currentJoke) return;

            let jokeText = '';
            if (currentJoke.setup && currentJoke.punchline) {
                jokeText = `${currentJoke.setup}\n${currentJoke.punchline}`;
            } else {
                jokeText = currentJoke.joke || '';
            }

            const text = `Ayo ketawa! 😂\n\n${jokeText}\n\nDapatkan lebih banyak lelucon di Joke Generator!`;

            if (navigator.share) {
                navigator.share({
                    title: 'Lelucon Lucu',
                    text: text
                }).catch(err => console.log('Error sharing:', err));
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(text).then(() => {
                    showSuccess('Lelucon siap untuk dibagikan!');
                });
            }
        }

        // Show Error Message
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('active');
            setTimeout(() => {
                errorMsg.classList.remove('active');
            }, 5000);
        }

        // Hide Error Message
        function hideError() {
            errorMsg.classList.remove('active');
        }

        // Show Success Message
        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.classList.add('active');
            setTimeout(() => {
                successMsg.classList.remove('active');
            }, 3000);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Event Listeners
        getJokeBtn.addEventListener('click', getJoke);
        copyBtn.addEventListener('click', copyToClipboard);
        shareBtn.addEventListener('click', shareJoke);
        categorySelect.addEventListener('change', () => {
            if (currentJoke) {
                getJoke();
            }
        });

        // Load first joke on page load
        window.addEventListener('load', () => {
            getJoke();
        });
    </script>
</body>
</html>
